<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم العود</title>

    <!-- Anti-Cache Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- PWA & iOS Icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="تعلم العود">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brown: {
                            50: '#fdf8f6', 100: '#f2e8e5', 200: '#eaddd7', 300: '#e0cec7',
                            400: '#d2bab0', 500: '#a18072', 600: '#8a6859', 700: '#694c3f',
                            800: '#4a352a', 900: '#271c15',
                        }
                    },
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { transition: background-color 0.2s, color 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans pb-40">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm p-4 relative flex justify-between items-center border-b border-gray-200 dark:border-gray-700">
        <button id="theme-btn" class="p-2 rounded-md bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Toggle Dark Mode">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-center flex-grow" dir="auto">تعلم العود</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-2xl mx-auto p-4 md:p-6 flex flex-col gap-6">
        
        <!-- Practice Routine Box -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 md:p-6">
            <div class="flex justify-between items-center mb-4">
                <button onclick="openModal()" class="text-white bg-brown-600 hover:bg-brown-700 rounded-full w-8 h-8 flex items-center justify-center font-bold text-xl leading-none transition shadow-sm pb-1">+</button>
                <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100" dir="rtl">تمارين العزف</h2>
            </div>
            
            <ul id="steps-list" class="space-y-3"></ul>
        </div>
        
    </main>

    <!-- Add/Edit Modal -->
    <div id="step-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-sm mx-4">
            <h3 id="modal-title" class="text-lg font-bold mb-4 text-gray-900 dark:text-white" dir="auto">إضافة تمرين</h3>
            <input type="text" id="modal-input" placeholder="اسم التمرين..." class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 mb-2" dir="auto">
            <textarea id="modal-desc" placeholder="وصف قصير..." class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 mb-4 h-20" dir="auto"></textarea>
            
            <div class="flex justify-between items-center w-full">
                <button id="modal-delete-btn" onclick="handleModalDelete()" class="hidden text-red-500 font-medium text-sm">حذف</button>
                <div class="flex space-x-3 ml-auto">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 dark:text-gray-400">إلغاء</button>
                    <button onclick="saveStep()" class="px-4 py-2 bg-brown-600 text-white rounded-lg">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 shadow-lg z-10 text-center">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-center items-center space-x-3 rtl:space-x-reverse mb-2">
                <span class="flex items-center justify-center w-8 h-8 rounded-md bg-gray-100 dark:bg-gray-700 font-semibold border">F</span>
                <span class="flex items-center justify-center w-8 h-8 rounded-md bg-gray-100 dark:bg-gray-700 font-semibold border">A</span>
                <span class="flex items-center justify-center w-8 h-8 rounded-md bg-gray-100 dark:bg-gray-700 font-semibold border">D</span>
                <span class="flex items-center justify-center w-8 h-8 rounded-md bg-gray-100 dark:bg-gray-700 font-semibold border">G</span>
                <span class="flex items-center justify-center w-8 h-8 rounded-md bg-gray-100 dark:bg-gray-700 font-semibold border">C</span>
            </div>
            <div class="text-xs text-gray-400">v1.5</div>
        </div>
    </footer>

    <script>
        let routine = [];
        let db;
        let globalTimer = null;

        function initDB() {
            const request = indexedDB.open('OudTrackerDB', 3);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                loadData();
            };
        }

        function loadData() {
            const tx = db.transaction('data', 'readonly');
            const req = tx.objectStore('data').get('myRoutine');
            req.onsuccess = () => {
                let data = req.result;
                // Migration: If data is old/missing, set default Arabic steps
                if (!data || data.length === 0 || (data[0].name === "Warm-up")) {
                    routine = [
                        { id: 1, name: "احماء لليد ودوزان العود", desc: "تأكد من سلامة الجلسة ومسكة الريشة", seconds: 0, isRunning: false, isDone: false },
                        { id: 2, name: "تمرين صد رد ٨ مرات على كل وتر", desc: "التركيز على نظافة الصوت وسرعة الريشة", seconds: 0, isRunning: false, isDone: false },
                        { id: 3, name: "تمرين صد مطلق رد اول صد ثاني ...", desc: "تمرين التوافق الحركي بين اليد اليمنى واليسرى", seconds: 0, isRunning: false, isDone: false }
                    ];
                    saveData();
                } else {
                    routine = data.map(s => ({...s, isRunning: false}));
                }
                render();
            };
        }

        function saveData() {
            const tx = db.transaction('data', 'readwrite');
            tx.objectStore('data').put(routine, 'myRoutine');
        }

        function render() {
            const list = document.getElementById('steps-list');
            list.innerHTML = '';
            routine.forEach((step, index) => {
                const li = document.createElement('li');
                li.className = `p-4 rounded-xl border ${step.isDone ? 'bg-gray-100 dark:bg-gray-700 opacity-60' : 'bg-white dark:bg-gray-800'}`;
                li.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-grow">
                            <h4 class="font-bold text-lg">${index + 1}. ${step.name}</h4>
                            <p class="text-sm text-gray-500">${step.desc || ''}</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="moveStep(${index}, -1)" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded">⬆️</button>
                            <button onclick="moveStep(${index}, 1)" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded">⬇️</button>
                            <button onclick="openModal(${index})" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded">✏️</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t">
                        <span class="font-mono text-xl font-bold">${formatTime(step.seconds)}</span>
                        <div class="flex gap-2">
                            ${!step.isDone ? `
                                <button onclick="toggleTimer(${index})" class="px-3 py-1 bg-brown-600 text-white rounded-lg">${step.isRunning ? 'إيقاف' : 'بدء'}</button>
                                <button onclick="completeStep(${index})" class="px-3 py-1 bg-green-600 text-white rounded-lg">تم</button>
                            ` : `<button onclick="completeStep(${index})" class="px-3 py-1 bg-gray-500 text-white rounded-lg">تراجع</button>`}
                        </div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function moveStep(idx, dir) {
            const newIdx = idx + dir;
            if (newIdx >= 0 && newIdx < routine.length) {
                [routine[idx], routine[newIdx]] = [routine[newIdx], routine[idx]];
                saveData(); render();
            }
        }

        let editIdx = -1;
        function openModal(i = -1) {
            editIdx = i;
            document.getElementById('modal-title').textContent = i >= 0 ? "تعديل" : "إضافة";
            document.getElementById('modal-input').value = i >= 0 ? routine[i].name : "";
            document.getElementById('modal-desc').value = i >= 0 ? (routine[i].desc || "") : "";
            document.getElementById('modal-delete-btn').classList.toggle('hidden', i < 0);
            document.getElementById('step-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('step-modal').classList.add('hidden'); }
        function saveStep() {
            const name = document.getElementById('modal-input').value;
            const desc = document.getElementById('modal-desc').value;
            if(editIdx >= 0) { routine[editIdx].name = name; routine[editIdx].desc = desc; }
            else { routine.push({ id: Date.now(), name, desc, seconds: 0, isRunning: false, isDone: false }); }
            saveData(); render(); closeModal();
        }
        function handleModalDelete() { routine.splice(editIdx, 1); saveData(); render(); closeModal(); }
        function toggleTimer(i) {
            routine.forEach((s, idx) => s.isRunning = (idx === i ? !s.isRunning : false));
            render(); manageTimer();
        }
        function completeStep(i) { routine[i].isDone = !routine[i].isDone; routine[i].isRunning = false; saveData(); render(); manageTimer(); }
        
        function manageTimer() {
            if(globalTimer) clearInterval(globalTimer);
            const active = routine.find(s => s.isRunning);
            if(active) globalTimer = setInterval(() => { active.seconds++; saveData(); render(); }, 1000);
        }

        function formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }

        document.getElementById('theme-btn').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };
        if(localStorage.theme === 'dark') document.documentElement.classList.add('dark');
        
        initDB();
    </script>
</body>
</html>
