<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oud Training Tracker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom scrollbar for history */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Smooth transitions */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans pb-20">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Oud Training Tracker</h1>
        <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
            <!-- Moon icon -->
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
            <!-- Sun icon -->
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
        </button>
    </header>

    <main class="flex-grow w-full max-w-2xl mx-auto p-4 md:p-6 flex flex-col gap-6">
        
        <!-- Steps List -->
        <section class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6 mt-2">
            <h2 class="text-xl font-bold mb-4">Training Steps</h2>
            <ul id="steps-list" class="space-y-3">
                <!-- Steps will be injected here by JS -->
            </ul>
        </section>

    </main>

    <!-- Floating Action Button (FAB) -->
    <button onclick="openAddModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg flex items-center justify-center text-3xl transition-transform hover:scale-105 z-40" title="Add Step">
        +
    </button>

    <!-- Add Step Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-sm mx-4">
            <h3 class="text-lg font-bold mb-4">Add New Step</h3>
            <input type="text" id="modal-step-input" placeholder="Enter new training step..." class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-gray-900 dark:text-white">
            <div class="flex justify-end space-x-3">
                <button onclick="closeAddModal()" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition font-medium">Cancel</button>
                <button onclick="confirmAddStep()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold shadow-sm transition">Save Step</button>
            </div>
        </div>
    </div>

    <!-- Bottom Fixed Bar -->
    <footer class="fixed bottom-0 left-0 w-full bg-gray-200 dark:bg-gray-800 border-t border-gray-300 dark:border-gray-700 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10">
        <div class="max-w-2xl mx-auto flex justify-between items-center h-full">
            
            <!-- Tuning Notes -->
            <div class="flex items-center space-x-3">
                <span class="text-xs uppercase font-bold text-gray-500 dark:text-gray-400 mr-2">Tuning</span>
                <div class="flex space-x-2">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 font-bold shadow-inner">F</span>
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 font-bold shadow-inner">A</span>
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 font-bold shadow-inner">D</span>
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 font-bold shadow-inner">G</span>
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 font-bold shadow-inner">C</span>
                </div>
            </div>

            <!-- Metronome Placeholder -->
            <div class="flex flex-col items-end justify-center px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-lg border border-dashed border-gray-400 dark:border-gray-500">
                <span class="text-sm font-semibold opacity-50">Metronome</span>
                <span class="text-xs opacity-40">(Placeholder)</span>
            </div>
            
        </div>
    </footer>

    <script>
        // --- 1. Configuration & State ---
        let currentSessionSteps = [];
        let timerInterval = null;
        let db = null;

        // --- 2. DOM Elements ---
        const stepsListEl = document.getElementById('steps-list');
        const addModal = document.getElementById('add-modal');
        const modalInput = document.getElementById('modal-step-input');

        // --- 3. Formatting ---
        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- 4. Rendering UI ---
        function renderSteps() {
            stepsListEl.innerHTML = '';
            if (currentSessionSteps.length === 0) {
                stepsListEl.innerHTML = '<div class="text-sm text-gray-500 italic text-center py-6">No steps added yet. Click the + button to add one.</div>';
                return;
            }

            currentSessionSteps.forEach((step, index) => {
                const li = document.createElement('li');
                const isRunning = step.isRunning || false;
                
                li.className = "flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded-lg border gap-3 transition-colors " + 
                    (isRunning ? "bg-blue-50 border-blue-200 dark:bg-blue-900/30 dark:border-blue-800" : 
                    step.completed ? "bg-gray-50 border-transparent dark:bg-gray-800/50" : "bg-white border-gray-100 dark:bg-gray-800 dark:border-gray-700");

                const nameStyle = step.completed ? "line-through text-gray-400 dark:text-gray-500" : 
                                  (isRunning ? "font-bold text-blue-700 dark:text-blue-400" : "font-medium text-gray-700 dark:text-gray-200");

                const timeStr = formatTime(step.duration);
                const timeColor = isRunning ? 'text-blue-600 dark:text-blue-400 font-bold' : (step.completed ? 'text-gray-500' : 'text-gray-600 dark:text-gray-400');

                let playBtn = '';
                let completeBtn = '';

                if (!step.completed) {
                    if (isRunning) {
                        playBtn = `<button onclick="toggleTimer(${index})" class="text-amber-600 hover:text-amber-700 dark:text-amber-400 dark:hover:text-amber-300 p-2 bg-amber-100 dark:bg-amber-900/50 rounded-md transition" title="Pause Timer"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg></button>`;
                    } else {
                        playBtn = `<button onclick="toggleTimer(${index})" class="text-green-600 hover:text-green-700 dark:text-green-400 dark:hover:text-green-300 p-2 bg-green-100 dark:bg-green-900/50 rounded-md transition" title="Start Timer"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg></button>`;
                    }
                    completeBtn = `<button onclick="completeStep(${index})" class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 p-2 bg-blue-100 dark:bg-blue-900/50 rounded-md transition" title="Mark as Done"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></button>`;
                } else {
                    completeBtn = `<button onclick="uncompleteStep(${index})" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 p-2 bg-gray-200 dark:bg-gray-700 rounded-md transition" title="Undo"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg></button>`;
                }

                const actionsHtml = `
                    <div class="flex items-center space-x-1.5 ml-2">
                        ${playBtn}
                        ${completeBtn}
                        <button onclick="editStep(${index})" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 p-2 bg-gray-100 dark:bg-gray-700 rounded-md transition" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteStep(${index})" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 p-2 bg-red-100 dark:bg-red-900/50 rounded-md transition" title="Delete">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;

                li.innerHTML = `
                    <div class="flex items-start sm:items-center flex-grow min-w-0 mr-0 sm:mr-3 gap-3">
                        <span class="${nameStyle} flex-grow break-words" title="${step.name}">${step.name}</span>
                    </div>
                    <div class="flex items-center justify-between sm:justify-end flex-shrink-0 w-full sm:w-auto mt-2 sm:mt-0 border-t sm:border-0 border-gray-200 dark:border-gray-700 pt-2 sm:pt-0">
                        <span id="timer-step-${index}" class="font-mono tracking-wider text-sm w-12 text-right ${timeColor}">
                            ${timeStr}
                        </span>
                        ${actionsHtml}
                    </div>
                `;
                stepsListEl.appendChild(li);
            });
        }

        // --- 5. Step Management & Modal Logic ---
        function openAddModal() {
            addModal.classList.remove('hidden');
            setTimeout(() => modalInput.focus(), 100);
        }

        function closeAddModal() {
            addModal.classList.add('hidden');
            modalInput.value = '';
        }

        function confirmAddStep() {
            const name = modalInput.value.trim();
            if (name) {
                currentSessionSteps.push({ name: name, duration: 0, completed: false, isRunning: false });
                saveStepsToDB();
                renderSteps();
                closeAddModal();
            }
        }
        
        modalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') confirmAddStep();
        });

        window.deleteStep = function(index) {
            if (confirm('Delete this step?')) {
                currentSessionSteps.splice(index, 1);
                saveStepsToDB();
                renderSteps();
                manageGlobalTimer();
            }
        }

        window.editStep = function(index) {
            const currentName = currentSessionSteps[index].name;
            const newName = prompt('Edit step name:', currentName);
            if (newName !== null && newName.trim() !== '') {
                currentSessionSteps[index].name = newName.trim();
                saveStepsToDB();
                renderSteps();
            }
        }

        // --- 6. Timer Logic ---
        function toggleTimer(index) {
            const step = currentSessionSteps[index];
            if (step.isRunning) {
                step.isRunning = false;
            } else {
                // Pause all other running timers automatically
                currentSessionSteps.forEach(s => s.isRunning = false);
                step.isRunning = true;
            }
            saveStepsToDB();
            renderSteps();
            manageGlobalTimer();
        }

        function completeStep(index) {
            currentSessionSteps[index].completed = true;
            currentSessionSteps[index].isRunning = false;
            saveStepsToDB();
            renderSteps();
            manageGlobalTimer();
        }

        function uncompleteStep(index) {
            currentSessionSteps[index].completed = false;
            saveStepsToDB();
            renderSteps();
        }

        function manageGlobalTimer() {
            const hasRunning = currentSessionSteps.some(s => s.isRunning);
            if (hasRunning && !timerInterval) {
                timerInterval = setInterval(() => {
                    const activeIndex = currentSessionSteps.findIndex(s => s.isRunning);
                    if (activeIndex !== -1) {
                        currentSessionSteps[activeIndex].duration++;
                        const el = document.getElementById(`timer-step-${activeIndex}`);
                        if (el) el.textContent = formatTime(currentSessionSteps[activeIndex].duration);
                    }
                }, 1000);
            } else if (!hasRunning && timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // --- 7. IndexedDB Logic ---
        const DB_NAME = 'OudTrainingTracker';
        const DB_VERSION = 2; 
        const STORE_NAME = 'routine_data';

        function initDB() {
            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = (event) => {
                console.error("Database error: " + event.target.errorCode);
            };

            request.onupgradeneeded = (event) => {
                db = event.target.result;
                // Clean up old tables if upgrading
                if (db.objectStoreNames.contains('sessions')) {
                    db.deleteObjectStore('sessions');
                }
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: "id" });
                }
            };

            request.onsuccess = (event) => {
                db = event.target.result;
                loadStepsFromDB();
            };
        }

        function saveStepsToDB() {
            if (!db) return;
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            // Save the entire array under a single key
            store.put({ id: 'my_routine', steps: currentSessionSteps });
        }

        function loadStepsFromDB() {
            if (!db) return;
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get('my_routine');

            request.onsuccess = (event) => {
                if (event.target.result && event.target.result.steps && event.target.result.steps.length > 0) {
                    // Reset isRunning to false on load to prevent ghost timers if refreshed
                    currentSessionSteps = event.target.result.steps.map(s => ({...s, isRunning: false}));
                } else {
                    // Default steps for new users
                    currentSessionSteps = [
                        { name: "Warm-up (Risha Exercises)", duration: 0, completed: false, isRunning: false },
                        { name: "Left Hand Independence", duration: 0, completed: false, isRunning: false },
                        { name: "Maqam Scales", duration: 0, completed: false, isRunning: false }
                    ];
                    saveStepsToDB();
                }
                renderSteps();
            };
        }

        // --- 8. Dark Mode Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeUI(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                localStorage.setItem('color-theme', 'light');
                updateThemeUI(false);
            } else {
                localStorage.setItem('color-theme', 'dark');
                updateThemeUI(true);
            }
        }

        // Check initial theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            updateThemeUI(true);
        } else {
            updateThemeUI(false);
        }

        themeToggleBtn.addEventListener('click', toggleTheme);

        // --- 9. Boot Up ---
        initDB();

    </script>
</body>
</html>
